asyncapi: 3.0.0

info:
  title: wgrok
  version: 2.0.0
  description: |
    A message bus protocol that uses social messaging platforms (Webex, Slack,
    Discord) as transport. Enables agents, services, and orchestrators to
    communicate across firewalls without inbound webhooks.

    ## Message format

    All wgrok messages use colon-delimited text:

    ```
    ./{context}:{...rest}
    ```

    The `./` prefix signals that this is a wgrok command, not a plain message.
    What follows the `./` depends on the deployment mode.

    ## Deployment modes

    ### Mode A — Platform Bot

    ```
    ./{app}:{payload}
    ```

    A central bot acts as a gateway, abstracting platform complexity for a
    large engineering organization. Developers don't need to know how to
    get SSL certs, create Webex bots, submit IT approvals, or configure LDAP.
    They integrate with one SDK that talks to one bot.

    - `./{app}` identifies which backend application to route to
    - The bot receives the message, looks up the app in its registry,
      and forwards the payload to the app's internal webhook
    - When the app responds through the bot, it sends `./{app}:{response}`
      so the original sender knows which app is responding

    **Example: Developer platform**
    ```
    Developer ──./jira:create ticket for PROJ-123──► Platform Bot
                                                        │
                                                        ├──► Jira webhook (internal)
                                                        │
    Developer ◄──./jira:PROJ-456 created───────────── Platform Bot
    ```

    The platform bot is the single integration point. It owns the Webex
    identity, handles the WebSocket connection, and routes messages to
    backend services. Developers only need a token and the SDK.

    ### Mode B — Agent Bus

    ```
    ./{verb}:{slug}:{payload}
    ```

    No central routing bot. Multiple agents share the same messaging token
    and all receive all messages. The verb tells a relay agent what to do,
    and the slug identifies which agent should process the result.

    This is needed because all agents on the shared token see every message.
    The slug is how an agent filters: "is this message for me?"

    - `./{verb}` is the action — `echo` means "reflect this back to me"
    - `{slug}` is the agent identifier (like a NATS subject)
    - `{payload}` is the data

    **Example: Firewall traversal**
    ```
    Sender ──./echo:deploy-agent:start deploy──► Echo Bot
                                                    │
    Receiver ◄──deploy-agent:start deploy───────── Echo Bot
    (only processes because slug matches "deploy-agent")
    ```

    All agents on the bus receive the echo bot's response, but only the
    agent configured with slug `deploy-agent` processes it.

    ## Protocol layers

    The two modes compose into a layered format:

    ```
    Layer 0:  {slug}:{payload}                ← base: agent-to-agent direct
    Layer 1a: ./{app}:{payload}               ← platform bot: central routing
    Layer 1b: ./{verb}:{slug}:{payload}       ← agent bus: verb + agent filtering
    ```

    **Layer 0** is the response format that receivers always consume,
    regardless of which mode sent it. After bot processing, the `./` prefix
    and routing context are stripped, leaving `{slug}:{payload}`.

    ### How the bot decides

    The `./` prefix is always present on inbound commands. The bot's
    configuration determines interpretation:

    | Bot mode | First segment after `./` | Parsing |
    |----------|--------------------------|---------|
    | Platform bot | App name from registry | `./{app}:{payload}` — two segments |
    | Agent relay | Known verb (echo, route, etc.) | `./{verb}:{slug}:{payload}` — three segments |

    Unrecognized contexts are silently ignored.

    ## Built-in verbs (Mode B)

    | Verb | Behavior | Use case |
    |------|----------|----------|
    | `echo` | Reflect message back to sender | Firewall traversal — agents behind firewalls relay through the echo bot |
    | `route` | Forward to internal system by slug | Orchestrator-to-orchestrator — GitHub Actions to on-prem |
    | `broadcast` | Fan out to all matching subscribers | Event notification across multiple agents |
    | `store` | Persist payload for later retrieval | Async message queue |

    Only `echo` is implemented in v1.0. Other verbs are reserved.
    Implementations MUST ignore unrecognized verbs gracefully.

    ## Transport bindings

    The protocol is transport-agnostic. Any platform with a REST API for
    sending and a persistent connection for receiving works:

    | Platform | Send | Receive | Status |
    |----------|------|---------|--------|
    | Webex | REST `/v1/messages` | Mercury WebSocket | Implemented |
    | Slack | `chat.postMessage` | Socket Mode WebSocket | Planned |
    | Discord | REST `/channels/{id}/messages` | Gateway WebSocket | Planned |

  license:
    name: MIT
  contact:
    name: wgrok
    url: https://github.com/3rg0n/wgrok

defaultContentType: text/plain

channels:
  platformCommand:
    address: platform/messages/platform-command
    title: Platform Command (Mode A)
    description: |
      Mode A channel: developer to platform bot. The message text contains
      a platform command in the format `./{app}:{payload}`.

      The bot looks up `{app}` in its registry and forwards the payload
      to the app's internal webhook.
    messages:
      platformCommand:
        $ref: '#/components/messages/PlatformCommand'

  verbCommand:
    address: platform/messages/verb-command
    title: Verb Command (Mode B)
    description: |
      Mode B channel: sender to relay agent. The message text contains
      a verb-routed command in the format `./{verb}:{slug}:{payload}`.

      The relay agent (e.g., echo bot) parses the verb, acts accordingly,
      and delivers `{slug}:{payload}` to the destination.
    messages:
      verbCommand:
        $ref: '#/components/messages/VerbCommand'

  agentMessage:
    address: platform/messages/agent-message
    title: Agent Message (Layer 0)
    description: |
      The base message format `{slug}:{payload}`. This is what receivers
      always consume, regardless of which mode produced it.

      Used for:
      - Bot responses after processing (stripped of `./` prefix)
      - Direct agent-to-agent messaging without bot routing
      - Platform bot responses: `./{app}:{response}` → receiver sees `{app}:{response}`
    messages:
      agentMessage:
        $ref: '#/components/messages/AgentMessage'

operations:
  # Mode A operations
  sendPlatformCommand:
    action: send
    channel:
      $ref: '#/channels/platformCommand'
    title: Send Platform Command
    summary: Developer sends a command to the platform bot for routing to a backend app.
    description: |
      The developer SDK wraps the payload with the app identifier and sends
      it to the platform bot. The bot handles all platform complexity
      (authentication, routing, webhook delivery) on behalf of the developer.
    messages:
      - $ref: '#/channels/platformCommand/messages/platformCommand'

  processPlatformCommand:
    action: receive
    channel:
      $ref: '#/channels/platformCommand'
    title: Process Platform Command
    summary: Platform bot receives, validates, and routes to the backend app.
    description: |
      The platform bot processes the command:

      1. **Allowlist check** — verify sender is authorized.
      2. **App lookup** — match `{app}` against the registered app registry.
      3. **Forward** — POST the payload to the app's internal webhook.
      4. When the app responds, the bot sends `./{app}:{response}` back.
    messages:
      - $ref: '#/channels/platformCommand/messages/platformCommand'

  # Mode B operations
  sendVerbCommand:
    action: send
    channel:
      $ref: '#/channels/verbCommand'
    title: Send Verb Command
    summary: Sender formats and transmits a verb-routed command to the relay agent.
    description: |
      The sender wraps the payload with a verb and slug, then sends it
      to the relay agent (e.g., echo bot).

      The message may optionally include an Adaptive Card attachment,
      which the relay agent will forward to the destination.
    messages:
      - $ref: '#/channels/verbCommand/messages/verbCommand'

  processVerbCommand:
    action: receive
    channel:
      $ref: '#/channels/verbCommand'
    title: Process Verb Command
    summary: Relay agent receives, validates, and routes based on verb.
    description: |
      The relay agent processes the command:

      1. **Allowlist check** — verify sender matches configured domain patterns.
      2. **Command detection** — check for `./` prefix.
      3. **Verb dispatch**:
         - `echo`: strip prefix, send `{slug}:{payload}` back to sender
         - `route`: forward to configured internal system
         - Unknown verbs: log and ignore
      4. **Delivery** — send result as Layer 0 format.
    messages:
      - $ref: '#/channels/verbCommand/messages/verbCommand'

  # Shared operations
  deliverAgentMessage:
    action: send
    channel:
      $ref: '#/channels/agentMessage'
    title: Deliver Agent Message
    summary: Bot delivers processed message in Layer 0 format.
    messages:
      - $ref: '#/channels/agentMessage/messages/agentMessage'

  receiveAgentMessage:
    action: receive
    channel:
      $ref: '#/channels/agentMessage'
    title: Receive Agent Message
    summary: Agent matches slug and delivers payload to application.
    description: |
      The receiver processes incoming messages:

      1. **Allowlist check** — verify the sender is authorized.
      2. **Parse** — extract `{slug}` and `{payload}` from the text.
      3. **Slug match** — compare slug to configured value.
         Non-matching slugs are ignored (multiple agents can share one account).
      4. **Deliver** — invoke the application handler with slug, payload,
         and any Adaptive Card attachments.
    messages:
      - $ref: '#/channels/agentMessage/messages/agentMessage'

  sendDirectAgentMessage:
    action: send
    channel:
      $ref: '#/channels/agentMessage'
    title: Send Direct Agent Message (Layer 0)
    summary: Agent-to-agent messaging without bot routing.
    messages:
      - $ref: '#/channels/agentMessage/messages/agentMessage'

components:
  messages:
    PlatformCommand:
      name: PlatformCommand
      title: Platform Command Message (Mode A)
      summary: |
        A message from a developer to the platform bot. Format: `./{app}:{payload}`.
        The bot routes to the named app's internal webhook.
      contentType: text/plain
      payload:
        $ref: '#/components/schemas/PlatformCommandPayload'
      headers:
        $ref: '#/components/schemas/MessageEnvelope'
      examples:
        - name: Jira integration
          summary: Developer creates a Jira ticket through the platform
          headers:
            personEmail: developer@bigcorp.com
            toPersonEmail: platform-bot@webex.bot
          payload:
            text: ./jira:create ticket for PROJ-123
        - name: Deploy trigger
          summary: CI/CD pipeline triggers a deployment
          headers:
            personEmail: github-actions@bigcorp.com
            toPersonEmail: platform-bot@webex.bot
          payload:
            text: ./deploy:{"ref":"main","env":"prod","service":"api"}
        - name: Monitoring alert
          summary: App sends an alert through the platform
          headers:
            personEmail: platform-bot@webex.bot
            toPersonEmail: developer@bigcorp.com
          payload:
            text: ./grafana:CPU threshold exceeded on prod-api-3

    VerbCommand:
      name: VerbCommand
      title: Verb Command Message (Mode B)
      summary: |
        A message sent to a relay agent. Format: `./{verb}:{slug}:{payload}`.
        The verb determines the action; the slug identifies the target agent.
      contentType: text/plain
      payload:
        $ref: '#/components/schemas/VerbCommandPayload'
      headers:
        $ref: '#/components/schemas/MessageEnvelope'
      examples:
        - name: Echo command
          summary: Reflect a message back to the sender for agent filtering
          headers:
            personEmail: sender@example.com
            toPersonEmail: echo-bot@webex.bot
          payload:
            text: ./echo:deploy-agent:start deploy on prod
        - name: Echo with card
          summary: Echo with an Adaptive Card attachment
          headers:
            personEmail: sender@example.com
            toPersonEmail: echo-bot@webex.bot
          payload:
            text: ./echo:myagent:card payload
            attachments:
              - contentType: application/vnd.microsoft.card.adaptive
                content:
                  type: AdaptiveCard
                  body:
                    - type: TextBlock
                      text: Hello from sender
        - name: Route command (future)
          summary: Forward to an internal system
          headers:
            personEmail: github-actions@example.com
            toPersonEmail: relay-bot@webex.bot
          payload:
            text: ./route:onprem-orchestrator:{"action":"deploy","ref":"main"}

    AgentMessage:
      name: AgentMessage
      title: Agent Message (Layer 0)
      summary: |
        The base message format `{slug}:{payload}`. Receivers always consume
        this format, regardless of which mode produced it.
      contentType: text/plain
      payload:
        $ref: '#/components/schemas/AgentMessagePayload'
      headers:
        $ref: '#/components/schemas/MessageEnvelope'
      examples:
        - name: Echo response
          summary: Echo bot reflects message back, slug identifies target agent
          headers:
            personEmail: echo-bot@webex.bot
            toPersonEmail: sender@example.com
          payload:
            text: deploy-agent:start deploy on prod
        - name: Platform bot response
          summary: Platform bot relays app response back to developer
          headers:
            personEmail: platform-bot@webex.bot
            toPersonEmail: developer@bigcorp.com
          payload:
            text: jira:PROJ-456 created successfully
        - name: Direct agent message
          summary: Agent-to-agent without bot routing
          headers:
            personEmail: agent-a@example.com
            toPersonEmail: agent-b@example.com
          payload:
            text: deploy-agent:{"status":"complete","ref":"main"}

  schemas:
    PlatformCommandPayload:
      type: object
      description: |
        Mode A message body. The `text` field contains a platform command
        in the format `./{app}:{payload}`.

        The `{app}` identifier maps to a registered backend application
        in the platform bot's registry. The bot forwards `{payload}` to
        the app's internal webhook.
      required:
        - text
      properties:
        text:
          type: string
          description: |
            Platform command text. Format: `./{app}:{payload}`.

            - `{app}`: registered application identifier
            - `{payload}`: everything after the first colon, forwarded to the app

            Split on the first colon after `./`:
            - `./jira:create ticket` → app=`jira`, payload=`create ticket`
            - `./deploy:{"env":"prod"}` → app=`deploy`, payload=`{"env":"prod"}`
          pattern: '^\./[^:]+:.*$'
          examples:
            - ./jira:create ticket for PROJ-123
            - ./deploy:{"ref":"main","env":"prod"}
            - ./grafana:query cpu_usage last 1h
        attachments:
          type: array
          description: Optional Adaptive Card attachments.
          items:
            $ref: '#/components/schemas/CardAttachment'

    VerbCommandPayload:
      type: object
      description: |
        Mode B message body. The `text` field contains a verb-routed command
        in the format `./{verb}:{slug}:{payload}`.

        The verb tells the relay agent what to do. The slug identifies which
        agent should process the result. All agents on the shared token see
        every message — the slug is how they filter "is this for me?"
      required:
        - text
      properties:
        text:
          type: string
          description: |
            Verb command text. Format: `./{verb}:{slug}:{payload}`.

            - `{verb}`: action for the relay agent (e.g., `echo`, `route`)
            - `{slug}`: target agent identifier
            - `{payload}`: everything after the second colon (may contain colons)

            Split on the first two colons after `./`:
            - `./echo:myagent:hello` → verb=`echo`, slug=`myagent`, payload=`hello`
            - `./echo:deploy:a:b:c` → verb=`echo`, slug=`deploy`, payload=`a:b:c`
          pattern: '^\./[a-z]+:[^:]+:.*$'
          examples:
            - ./echo:deploy-agent:start deploy on prod
            - ./echo:otel-collector:trace_id=abc123
            - ./route:onprem-agent:trigger deploy
        attachments:
          type: array
          description: Optional Adaptive Card attachments forwarded through the relay.
          items:
            $ref: '#/components/schemas/CardAttachment'

    AgentMessagePayload:
      type: object
      description: |
        Layer 0 message body. The `text` field contains the base format
        `{slug}:{payload}`. This is the universal format that all receivers
        consume after bot processing strips the `./` prefix.
      required:
        - text
      properties:
        text:
          type: string
          description: |
            Agent message text. Format: `{slug}:{payload}`.

            Split on the first colon:
            - Everything before = slug (agent/app identifier)
            - Everything after = payload (preserved verbatim)

            If no colon is present, the entire text is the slug with empty payload.
          pattern: '^[^:]+(:.*)?$'
          examples:
            - deploy-agent:start deploy on prod
            - jira:PROJ-456 created successfully
            - otel-collector:trace_id=abc123
        attachments:
          type: array
          description: Adaptive Card attachments.
          items:
            $ref: '#/components/schemas/CardAttachment'

    CardAttachment:
      type: object
      description: A messaging platform Adaptive Card attachment.
      required:
        - contentType
        - content
      properties:
        contentType:
          type: string
          const: application/vnd.microsoft.card.adaptive
          description: Must be `application/vnd.microsoft.card.adaptive`.
        content:
          type: object
          description: |
            Adaptive Card JSON body following the Microsoft Adaptive Card
            schema (https://adaptivecards.io/schemas/adaptive-card.json).
          properties:
            type:
              type: string
              const: AdaptiveCard
            body:
              type: array
              items:
                type: object
          required:
            - type

    MessageEnvelope:
      type: object
      description: |
        Transport-level message metadata from the messaging platform.
        Field names use Webex conventions; other transports map equivalently.
      properties:
        personEmail:
          type: string
          format: email
          description: Email/identity of the message sender.
        toPersonEmail:
          type: string
          format: email
          description: Email/identity of the message recipient.
        id:
          type: string
          description: Platform-specific unique message ID.
        roomId:
          type: string
          description: Platform-specific conversation/channel ID.
        personId:
          type: string
          description: Platform-specific sender user ID.
        created:
          type: string
          format: date-time
          description: ISO 8601 timestamp of message creation.

    Verb:
      type: string
      description: |
        The action for the relay agent to execute (Mode B only).

        | Verb | Status | Behavior |
        |------|--------|----------|
        | `echo` | Implemented | Reflect message back to sender |
        | `route` | Reserved | Forward to internal system by slug |
        | `broadcast` | Reserved | Fan out to all matching subscribers |
        | `store` | Reserved | Persist payload for later retrieval |

        Custom verbs are allowed. Unrecognized verbs MUST be silently ignored.
      pattern: '^[a-z][a-z0-9]*$'
      examples:
        - echo
        - route
        - broadcast

    AppIdentifier:
      type: string
      description: |
        A registered application name in the platform bot's registry (Mode A).
        Maps to an internal webhook endpoint. The platform bot maintains the
        mapping between app identifiers and their backend URLs.
      minLength: 1
      pattern: '^[^:]+$'
      examples:
        - jira
        - deploy
        - grafana
        - servicenow

    Slug:
      type: string
      description: |
        An agent/service identifier, analogous to a NATS subject (Mode B).
        Each agent is configured with a slug and only processes messages
        matching that slug. This is how agents on a shared token filter
        messages intended for them.

        Rules:
        - Must be non-empty
        - Must not contain colons (colon is the field delimiter)
        - Case-sensitive
      minLength: 1
      pattern: '^[^:]+$'
      examples:
        - deploy-agent
        - otel-collector
        - github-orchestrator

    AllowlistPattern:
      type: string
      description: |
        A pattern used to authorize message senders.

        | Format | Example | Matches |
        |--------|---------|---------|
        | Domain | `example.com` | Any `*@example.com` |
        | Wildcard | `*@example.com` | Same as domain (explicit) |
        | Exact | `user@example.com` | Only that email |

        Matching is case-insensitive. Whitespace is trimmed. Empty patterns ignored.
      examples:
        - example.com
        - '*@example.com'
        - admin@example.com

    SenderConfig:
      type: object
      description: Configuration for the wgrok sender component.
      required:
        - WGROK_TOKEN
        - WGROK_TARGET
        - WGROK_SLUG
      properties:
        WGROK_TOKEN:
          type: string
          description: Messaging platform API token.
        WGROK_TARGET:
          type: string
          format: email
          description: Email/identity of the bot to send commands to.
        WGROK_SLUG:
          type: string
          description: |
            Slug to tag outgoing messages with (Mode B).
            In Mode A, this maps to the app identifier.
        WGROK_DOMAINS:
          type: string
          description: Comma-separated allowlist patterns. Optional for sender.
        WGROK_DEBUG:
          type: string
          description: |
            Enable NDJSON debug logging. Truthy: `true`, `1`, `yes`.
          default: 'false'

    BotConfig:
      type: object
      description: |
        Configuration for the wgrok bot component.
        Mode A: platform bot with app registry.
        Mode B: relay agent processing verbs.
      required:
        - WGROK_TOKEN
        - WGROK_DOMAINS
      properties:
        WGROK_TOKEN:
          type: string
          description: Platform API token (unique identity for the bot).
        WGROK_DOMAINS:
          type: string
          description: Comma-separated allowlist patterns. Required.
        WGROK_DEBUG:
          type: string
          default: 'false'

    ReceiverConfig:
      type: object
      description: Configuration for the wgrok receiver/agent component.
      required:
        - WGROK_TOKEN
        - WGROK_SLUG
        - WGROK_DOMAINS
      properties:
        WGROK_TOKEN:
          type: string
          description: Platform API token.
        WGROK_SLUG:
          type: string
          description: Slug to match incoming messages against.
        WGROK_DOMAINS:
          type: string
          description: Comma-separated allowlist patterns. Required.
        WGROK_DEBUG:
          type: string
          default: 'false'
