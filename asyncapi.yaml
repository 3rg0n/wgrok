asyncapi: 3.0.0

info:
  title: wgrok
  version: 1.0.0
  description: |
    A message bus protocol that uses social messaging platforms (Webex, Slack,
    Discord) as transport. Enables agents, services, and orchestrators to
    communicate across network boundaries without inbound webhooks.

    ## Message format

    All wgrok messages use colon-delimited text:

    ```
    ./{context}:{...rest}
    ```

    The `./` prefix signals that this is a wgrok command, not a plain message.
    What follows the `./` depends on the deployment mode.

    The payload is opaque — wgrok never inspects or transforms it. JSON, CSV,
    NDJSON, plain text, base64, YAML — whatever the sender puts in, the
    receiver gets out verbatim. The protocol only defines the structure around
    the payload (prefix, verb, slug, colons).

    ## Deployment modes

    All modes require a minimum of two bots:
    1. Bot for sending/receiving (the application's identity)
    2. Bot for message processing, routing, or reflection

    ### Mode A — App Routing

    ```
    ./{app}:{payload}
    ```

    A routing bot proxies to internal REST APIs that will never be on the bus.
    The bot maintains a registry of apps and their internal endpoints.
    Services don't need to know about wgrok — the bot translates.

    - `./{app}` identifies which backend application to route to
    - The bot receives the message, looks up the app in its registry,
      and forwards the payload to the app's internal endpoint
    - When the app responds, the bot sends `{app}:{response}` back

    **Example: REST API proxy**
    ```
    Developer ──./jira:create ticket──► Routing Bot ──► Jira REST API
    Developer ◄──jira:PROJ-456 created──────────────── Routing Bot

    Developer ──./github:create issue repo=foo──► Routing Bot ──► GitHub API
    Developer ◄──github:issue #42 created────────────── Routing Bot
    ```

    The developer sends one message. The bot handles the REST call, auth,
    pagination, error handling — whatever the target API requires.

    ### Mode B — Agent Bus

    ```
    ./{verb}:{slug}:{payload}
    ```

    Agents share the same messaging token and all receive all messages.
    The verb tells a relay bot what to do, and the slug identifies which
    agent should process the result.

    This is needed because all agents on the shared token see every message.
    The slug is how an agent filters: "is this message for me?"

    - `./{verb}` is the action — `echo` means "reflect this back to me"
    - `{slug}` is the agent identifier (like a NATS subject)
    - `{payload}` is the data

    **Example: Firewall traversal**
    ```
    Sender ──./echo:deploy-agent:start deploy──► Echo Bot
                                                    │
    Receiver ◄──deploy-agent:start deploy───────── Echo Bot
    (only processes because slug matches "deploy-agent")
    ```

    Simple, lightweight. Best for same trust zone, same network boundary.
    No registry needed — agents self-select by slug.

    ### Mode C — Registered Agents

    ```
    ./{verb}:{slug}:{payload}
    ```

    Agents have their own bot identities and register with the routing bot.
    The routing bot maintains a registry mapping slugs to bot identities.
    Agents don't need shared tokens. Cross-platform routing is possible.

    - `WGROK_ROUTES` maps slugs to bot identities (CSV format)
    - The routing bot resolves the slug and delivers to the registered bot
    - A Jira agent, GitHub agent, or any service can join the bus as a
      first-class participant with its own identity and command vocabulary

    **Example: Cross-boundary routing**
    ```
    Registry: deploy=deploy-bot@spark.com, jira=jira-agent@webex.bot

    Sender ──./echo:deploy:start──► Routing Bot
                                        │ (looks up "deploy" → deploy-bot@spark.com)
    deploy-bot@spark.com ◄──deploy:start── Routing Bot
    ```

    The difference from Mode A: Mode A proxies to REST APIs that will never
    be on the bus. Mode C routes to smart agents that chose to participate.

    ## Protocol layers

    The three modes compose into a layered format:

    ```
    Layer 0:  {slug}:{payload}                ← base: what receivers consume
    Layer 1a: ./{app}:{payload}               ← Mode A: REST API proxy
    Layer 1b: ./{verb}:{slug}:{payload}       ← Mode B/C: verb + slug filtering
    ```

    **Layer 0** is the response format that receivers always consume,
    regardless of which mode sent it. After bot processing, the `./` prefix
    and routing context are stripped, leaving `{slug}:{payload}`.

    Mode B and Mode C share the same wire format (Layer 1b). The difference
    is how the routing bot resolves the slug:
    - **Mode B**: echo back to sender (agents self-select by slug)
    - **Mode C**: look up slug in registry, route to registered bot
    - **Fallback**: registered slugs get routed, unregistered slugs get
      echoed — Mode B and C coexist on the same routing bot

    ### How the bot decides

    The `./` prefix is always present on inbound commands. The bot's
    configuration determines interpretation:

    | Bot mode | First segment after `./` | Parsing |
    |----------|--------------------------|---------|
    | App routing (A) | App name from registry | `./{app}:{payload}` — two segments |
    | Agent relay (B/C) | Known verb (echo, route, etc.) | `./{verb}:{slug}:{payload}` — three segments |

    For Mode B/C, the routing bot checks `WGROK_ROUTES`:
    - Slug found → deliver to registered bot (Mode C)
    - Slug not found → echo back to sender (Mode B)

    Unrecognized contexts are silently ignored.

    ## Built-in verbs (Mode B / Mode C)

    | Verb | Behavior | Use case |
    |------|----------|----------|
    | `echo` | Reflect back (B) or route to registered agent (C) | Firewall traversal, cross-boundary routing |
    | `route` | Forward to internal system by slug | Orchestrator-to-orchestrator |
    | `broadcast` | Fan out to all matching subscribers | Event notification across multiple agents |
    | `store` | Persist payload for later retrieval | Async message queue |

    Only `echo` is implemented in v1.0. Other verbs are reserved.
    Implementations MUST ignore unrecognized verbs gracefully.

    ## Transport bindings

    The protocol is transport-agnostic. Each platform is a transport binding
    with a send API and a receive mechanism:

    | Platform | Send | Receive (Persistent) | Receive (Webhook) | Status |
    |----------|------|---------------------|--------------------|--------|
    | Webex | REST `/v1/messages` | Mercury WebSocket | Webhook registration | Implemented |
    | Slack | `chat.postMessage` | Socket Mode WebSocket | Events API | Planned |
    | Discord | REST `/channels/{id}/messages` | Gateway WebSocket | Interactions endpoint | Planned |
    | IRC | `PRIVMSG` | Persistent TCP/TLS | N/A | Planned |

    ### Multi-platform, multi-token

    The routing bot supports multiple platforms simultaneously and multiple
    tokens per platform (CSV) for load balancing outbound sends:

    ```
    WGROK_WEBEX_TOKENS=token1,token2,token3
    WGROK_SLACK_TOKENS=xoxb-token1,xoxb-token2
    WGROK_DISCORD_TOKENS=bot-token1
    ```

    The routing bot opens a WebSocket listener per token, load balances
    outbound sends across tokens for the same platform, and routes
    cross-platform (Webex message → Slack agent).

    For senders and receivers, a single token with explicit platform:

    ```
    WGROK_TOKEN=<token>
    WGROK_PLATFORM=webex
    ```

    ### Webhook endpoint

    The routing bot can optionally expose an HTTP webhook endpoint:

    ```
    WGROK_WEBHOOK_PORT=8080
    WGROK_WEBHOOK_SECRET=shared-secret
    ```

    When enabled, the routing bot accepts `POST /wgrok` requests with a
    JSON body containing `text` and `from` fields. This allows non-chat
    integrations (CI/CD, monitoring, cron jobs) to post to the bus without
    a messaging platform token. Messages enter the same pipeline as
    WebSocket messages — allowlist check, protocol parsing, routing.

  license:
    name: MIT
  contact:
    name: wgrok
    url: https://github.com/3rg0n/wgrok

defaultContentType: text/plain

channels:
  appCommand:
    address: platform/messages/app-command
    title: App Command (Mode A)
    description: |
      Mode A channel: developer to routing bot. The message text contains
      an app command in the format `./{app}:{payload}`.

      The bot looks up `{app}` in its app registry and proxies the payload
      to the app's internal REST API endpoint.
    messages:
      appCommand:
        $ref: '#/components/messages/AppCommand'

  verbCommand:
    address: platform/messages/verb-command
    title: Verb Command (Mode B / Mode C)
    description: |
      Mode B/C channel: sender to relay/routing bot. The message text
      contains a verb-routed command in the format `./{verb}:{slug}:{payload}`.

      Mode B: the relay bot (e.g., router bot) reflects `{slug}:{payload}`
      back to the sender. Agents self-select by slug.

      Mode C: the routing bot looks up the slug in `WGROK_ROUTES` and
      delivers `{slug}:{payload}` to the registered bot identity.
      If the slug is not registered, falls back to Mode B (echo).
    messages:
      verbCommand:
        $ref: '#/components/messages/VerbCommand'

  webhookInbound:
    address: webhook/inbound
    title: Webhook Inbound
    description: |
      HTTP webhook endpoint for the routing bot. When `WGROK_WEBHOOK_PORT`
      is set, the bot starts an HTTP server accepting `POST /wgrok` requests.

      Messages arrive as JSON with `text` and `from` fields, enter the same
      processing pipeline as WebSocket messages. Useful for CI/CD, monitoring,
      cron jobs, or platforms that prefer webhook over WebSocket.

      Authentication via `Authorization: Bearer <WGROK_WEBHOOK_SECRET>`.
    messages:
      webhookMessage:
        $ref: '#/components/messages/WebhookMessage'

  agentMessage:
    address: platform/messages/agent-message
    title: Agent Message (Layer 0)
    description: |
      The base message format `{slug}:{payload}`. This is what receivers
      always consume, regardless of which mode produced it.

      Used for:
      - Bot responses after processing (stripped of `./` prefix)
      - Direct agent-to-agent messaging without bot routing
      - App routing responses: `./{app}:{response}` → receiver sees `{app}:{response}`
      - Registered agent delivery: routing bot sends to registered bot identity
    messages:
      agentMessage:
        $ref: '#/components/messages/AgentMessage'

operations:
  # Mode A operations
  sendAppCommand:
    action: send
    channel:
      $ref: '#/channels/appCommand'
    title: Send App Command
    summary: Developer sends a command to the routing bot for proxying to a backend REST API.
    description: |
      The developer SDK wraps the payload with the app identifier and sends
      it to the routing bot. The bot handles all API complexity (authentication,
      pagination, error handling) on behalf of the developer.
    messages:
      - $ref: '#/channels/appCommand/messages/appCommand'

  processAppCommand:
    action: receive
    channel:
      $ref: '#/channels/appCommand'
    title: Process App Command
    summary: Routing bot receives, validates, and proxies to the backend REST API.
    description: |
      The routing bot processes the command:

      1. **Allowlist check** — verify sender is authorized.
      2. **App lookup** — match `{app}` against the registered app registry.
      3. **Proxy** — translate to REST API call and forward.
      4. When the API responds, the bot sends `{app}:{response}` back.
    messages:
      - $ref: '#/channels/appCommand/messages/appCommand'

  # Mode B / Mode C operations
  sendVerbCommand:
    action: send
    channel:
      $ref: '#/channels/verbCommand'
    title: Send Verb Command
    summary: Sender formats and transmits a verb-routed command to the relay/routing bot.
    description: |
      The sender wraps the payload with a verb and slug, then sends it
      to the relay/routing bot.

      The message may optionally include an Adaptive Card attachment,
      which the bot will forward to the destination.
    messages:
      - $ref: '#/channels/verbCommand/messages/verbCommand'

  processVerbCommand:
    action: receive
    channel:
      $ref: '#/channels/verbCommand'
    title: Process Verb Command
    summary: Relay/routing bot receives, validates, and routes based on verb and registry.
    description: |
      The bot processes the command:

      1. **Allowlist check** — verify sender matches configured domain patterns.
      2. **Command detection** — check for `./` prefix.
      3. **Verb dispatch**:
         - `echo`: check `WGROK_ROUTES` for slug
           - Found → deliver to registered bot (Mode C)
           - Not found → echo back to sender (Mode B)
         - `route`: forward to configured internal system
         - Unknown verbs: log and ignore
      4. **Delivery** — send result as Layer 0 format.
    messages:
      - $ref: '#/channels/verbCommand/messages/verbCommand'

  # Webhook operations
  receiveWebhook:
    action: receive
    channel:
      $ref: '#/channels/webhookInbound'
    title: Receive Webhook Message
    summary: Routing bot receives a message via HTTP webhook endpoint.
    description: |
      When `WGROK_WEBHOOK_PORT` is configured, the routing bot listens for
      HTTP POST requests. The message enters the same processing pipeline:

      1. **Authentication** — verify `Authorization: Bearer <secret>` header.
      2. **Allowlist check** — verify `from` field against domain patterns.
      3. **Protocol parsing** — parse wgrok command from `text` field.
      4. **Route** — same routing logic as WebSocket messages.
    messages:
      - $ref: '#/channels/webhookInbound/messages/webhookMessage'

  # Shared operations
  deliverAgentMessage:
    action: send
    channel:
      $ref: '#/channels/agentMessage'
    title: Deliver Agent Message
    summary: Bot delivers processed message in Layer 0 format.
    messages:
      - $ref: '#/channels/agentMessage/messages/agentMessage'

  receiveAgentMessage:
    action: receive
    channel:
      $ref: '#/channels/agentMessage'
    title: Receive Agent Message
    summary: Agent matches slug and delivers payload to application.
    description: |
      The receiver processes incoming messages:

      1. **Allowlist check** — verify the sender is authorized.
      2. **Parse** — extract `{slug}` and `{payload}` from the text.
      3. **Slug match** — compare slug to configured value.
         Non-matching slugs are ignored (multiple agents can share one account).
      4. **Deliver** — invoke the application handler with slug, payload,
         and any Adaptive Card attachments.
    messages:
      - $ref: '#/channels/agentMessage/messages/agentMessage'

  sendDirectAgentMessage:
    action: send
    channel:
      $ref: '#/channels/agentMessage'
    title: Send Direct Agent Message (Layer 0)
    summary: Agent-to-agent messaging without bot routing.
    messages:
      - $ref: '#/channels/agentMessage/messages/agentMessage'

components:
  messages:
    AppCommand:
      name: AppCommand
      title: App Command Message (Mode A)
      summary: |
        A message from a developer to the routing bot. Format: `./{app}:{payload}`.
        The bot proxies to the named app's internal REST API.
      contentType: text/plain
      payload:
        $ref: '#/components/schemas/AppCommandPayload'
      headers:
        $ref: '#/components/schemas/MessageEnvelope'
      examples:
        - name: Jira integration
          summary: Developer creates a Jira ticket through the routing bot
          headers:
            personEmail: developer@example.com
            toPersonEmail: routing-bot@webex.bot
          payload:
            text: ./jira:create ticket for PROJ-123
        - name: GitHub integration
          summary: Developer creates a GitHub issue
          headers:
            personEmail: developer@example.com
            toPersonEmail: routing-bot@webex.bot
          payload:
            text: ./github:create issue repo=foo title=bar
        - name: Deploy trigger
          summary: CI/CD pipeline triggers a deployment
          headers:
            personEmail: github-actions@example.com
            toPersonEmail: routing-bot@webex.bot
          payload:
            text: ./deploy:{"ref":"main","env":"prod","service":"api"}

    VerbCommand:
      name: VerbCommand
      title: Verb Command Message (Mode B / Mode C)
      summary: |
        A message sent to a relay/routing bot. Format: `./{verb}:{slug}:{payload}`.
        The verb determines the action; the slug identifies the target agent.
        In Mode C, the slug is resolved via `WGROK_ROUTES` registry.
      contentType: text/plain
      payload:
        $ref: '#/components/schemas/VerbCommandPayload'
      headers:
        $ref: '#/components/schemas/MessageEnvelope'
      examples:
        - name: Echo command (Mode B)
          summary: Reflect a message back to the sender for agent filtering
          headers:
            personEmail: sender@example.com
            toPersonEmail: router-bot@webex.bot
          payload:
            text: ./echo:deploy-agent:start deploy on prod
        - name: Echo with routing (Mode C)
          summary: Route to a registered agent via slug lookup
          headers:
            personEmail: sender@example.com
            toPersonEmail: routing-bot@webex.bot
          payload:
            text: ./echo:deploy:start deploy on prod
        - name: Echo with card
          summary: Echo with an Adaptive Card attachment
          headers:
            personEmail: sender@example.com
            toPersonEmail: router-bot@webex.bot
          payload:
            text: ./echo:myagent:card payload
            attachments:
              - contentType: application/vnd.microsoft.card.adaptive
                content:
                  type: AdaptiveCard
                  body:
                    - type: TextBlock
                      text: Hello from sender
        - name: JSON payload
          summary: Structured JSON as payload (opaque to wgrok)
          headers:
            personEmail: orchestrator@example.com
            toPersonEmail: routing-bot@webex.bot
          payload:
            text: ./echo:deploy:{"action":"deploy","ref":"main","env":"prod"}
        - name: CSV payload
          summary: CSV data as payload (opaque to wgrok)
          headers:
            personEmail: etl-agent@example.com
            toPersonEmail: routing-bot@webex.bot
          payload:
            text: ./echo:data-agent:host,cpu,mem\nweb-1,45,2048\nweb-2,72,4096

    AgentMessage:
      name: AgentMessage
      title: Agent Message (Layer 0)
      summary: |
        The base message format `{slug}:{payload}`. Receivers always consume
        this format, regardless of which mode produced it.
      contentType: text/plain
      payload:
        $ref: '#/components/schemas/AgentMessagePayload'
      headers:
        $ref: '#/components/schemas/MessageEnvelope'
      examples:
        - name: Echo response (Mode B)
          summary: Echo bot reflects message back, slug identifies target agent
          headers:
            personEmail: router-bot@webex.bot
            toPersonEmail: sender@example.com
          payload:
            text: deploy-agent:start deploy on prod
        - name: Routed response (Mode C)
          summary: Routing bot delivers to registered agent
          headers:
            personEmail: routing-bot@webex.bot
            toPersonEmail: deploy-bot@spark.com
          payload:
            text: deploy:start deploy on prod
        - name: App routing response (Mode A)
          summary: Routing bot relays REST API response back to developer
          headers:
            personEmail: routing-bot@webex.bot
            toPersonEmail: developer@example.com
          payload:
            text: jira:PROJ-456 created successfully
        - name: Direct agent message
          summary: Agent-to-agent without bot routing
          headers:
            personEmail: agent-a@example.com
            toPersonEmail: agent-b@example.com
          payload:
            text: deploy-agent:{"status":"complete","ref":"main"}

    WebhookMessage:
      name: WebhookMessage
      title: Webhook Inbound Message
      summary: |
        A message received via the HTTP webhook endpoint. Contains a wgrok
        command in the `text` field and the sender identity in `from`.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/WebhookPayload'
      examples:
        - name: Echo via webhook
          summary: CI pipeline sends an echo command via webhook
          payload:
            text: ./echo:deploy:start deploy on prod
            from: ci-pipeline@example.com
        - name: App command via webhook
          summary: Monitoring system sends an alert via webhook
          payload:
            text: ./grafana:CPU threshold exceeded on prod-api-3
            from: monitoring@example.com

  schemas:
    WebhookPayload:
      type: object
      description: |
        HTTP webhook request body. The `text` field contains a wgrok command
        (same format as messaging platform messages). The `from` field
        identifies the sender for allowlist validation.
      required:
        - text
        - from
      properties:
        text:
          type: string
          description: wgrok command text (e.g., `./echo:deploy:start`).
        from:
          type: string
          format: email
          description: Sender identity for allowlist validation.
        attachments:
          type: array
          description: Optional Adaptive Card attachments.
          items:
            $ref: '#/components/schemas/CardAttachment'

    AppCommandPayload:
      type: object
      description: |
        Mode A message body. The `text` field contains an app command
        in the format `./{app}:{payload}`.

        The `{app}` identifier maps to a registered backend application
        in the routing bot's app registry. The bot proxies `{payload}` to
        the app's internal REST API endpoint.

        The payload is opaque — JSON, CSV, NDJSON, plain text, or any
        other format. wgrok passes it through verbatim.
      required:
        - text
      properties:
        text:
          type: string
          description: |
            App command text. Format: `./{app}:{payload}`.

            - `{app}`: registered application identifier
            - `{payload}`: everything after the first colon, forwarded to the app

            Split on the first colon after `./`:
            - `./jira:create ticket` → app=`jira`, payload=`create ticket`
            - `./deploy:{"env":"prod"}` → app=`deploy`, payload=`{"env":"prod"}`
          pattern: '^\./[^:]+:.*$'
          examples:
            - ./jira:create ticket for PROJ-123
            - ./deploy:{"ref":"main","env":"prod"}
            - ./github:create issue repo=foo title=bar
        attachments:
          type: array
          description: Optional Adaptive Card attachments.
          items:
            $ref: '#/components/schemas/CardAttachment'

    VerbCommandPayload:
      type: object
      description: |
        Mode B/C message body. The `text` field contains a verb-routed command
        in the format `./{verb}:{slug}:{payload}`.

        The verb tells the relay/routing bot what to do. The slug identifies
        which agent should process the result.

        In Mode B, all agents on the shared token see every message — the
        slug is how they filter "is this for me?"

        In Mode C, the routing bot resolves the slug via `WGROK_ROUTES`
        and delivers to the registered bot identity.

        The payload is opaque — JSON, CSV, NDJSON, plain text, or any
        other format. wgrok passes it through verbatim.
      required:
        - text
      properties:
        text:
          type: string
          description: |
            Verb command text. Format: `./{verb}:{slug}:{payload}`.

            - `{verb}`: action for the relay/routing bot (e.g., `echo`, `route`)
            - `{slug}`: target agent identifier
            - `{payload}`: everything after the second colon (may contain colons)

            Split on the first two colons after `./`:
            - `./echo:myagent:hello` → verb=`echo`, slug=`myagent`, payload=`hello`
            - `./echo:deploy:a:b:c` → verb=`echo`, slug=`deploy`, payload=`a:b:c`
          pattern: '^\./[a-z]+:[^:]+:.*$'
          examples:
            - ./echo:deploy-agent:start deploy on prod
            - ./echo:deploy:{"action":"deploy","ref":"main"}
            - ./echo:data-agent:host,cpu,mem\nweb-1,45,2048
        attachments:
          type: array
          description: Optional Adaptive Card attachments forwarded through the relay.
          items:
            $ref: '#/components/schemas/CardAttachment'

    AgentMessagePayload:
      type: object
      description: |
        Layer 0 message body. The `text` field contains the base format
        `{slug}:{payload}`. This is the universal format that all receivers
        consume after bot processing strips the `./` prefix.
      required:
        - text
      properties:
        text:
          type: string
          description: |
            Agent message text. Format: `{slug}:{payload}`.

            Split on the first colon:
            - Everything before = slug (agent/app identifier)
            - Everything after = payload (preserved verbatim)

            If no colon is present, the entire text is the slug with empty payload.
          pattern: '^[^:]+(:.*)?$'
          examples:
            - deploy-agent:start deploy on prod
            - jira:PROJ-456 created successfully
            - deploy:{"status":"complete","ref":"main"}
        attachments:
          type: array
          description: Adaptive Card attachments.
          items:
            $ref: '#/components/schemas/CardAttachment'

    CardAttachment:
      type: object
      description: A messaging platform Adaptive Card attachment.
      required:
        - contentType
        - content
      properties:
        contentType:
          type: string
          const: application/vnd.microsoft.card.adaptive
          description: Must be `application/vnd.microsoft.card.adaptive`.
        content:
          type: object
          description: |
            Adaptive Card JSON body following the Microsoft Adaptive Card
            schema (https://adaptivecards.io/schemas/adaptive-card.json).
          properties:
            type:
              type: string
              const: AdaptiveCard
            body:
              type: array
              items:
                type: object
          required:
            - type

    MessageEnvelope:
      type: object
      description: |
        Transport-level message metadata from the messaging platform.
        Field names use Webex conventions; other transports map equivalently.
      properties:
        personEmail:
          type: string
          format: email
          description: Email/identity of the message sender.
        toPersonEmail:
          type: string
          format: email
          description: Email/identity of the message recipient.
        id:
          type: string
          description: Platform-specific unique message ID.
        roomId:
          type: string
          description: Platform-specific conversation/channel ID.
        personId:
          type: string
          description: Platform-specific sender user ID.
        created:
          type: string
          format: date-time
          description: ISO 8601 timestamp of message creation.

    Verb:
      type: string
      description: |
        The action for the relay/routing bot to execute (Mode B/C only).

        | Verb | Status | Behavior |
        |------|--------|----------|
        | `echo` | Implemented | Reflect back (B) or route to registered agent (C) |
        | `route` | Reserved | Forward to internal system by slug |
        | `broadcast` | Reserved | Fan out to all matching subscribers |
        | `store` | Reserved | Persist payload for later retrieval |

        Custom verbs are allowed. Unrecognized verbs MUST be silently ignored.
      pattern: '^[a-z][a-z0-9]*$'
      examples:
        - echo
        - route
        - broadcast

    AppIdentifier:
      type: string
      description: |
        A registered application name in the routing bot's app registry (Mode A).
        Maps to an internal REST API endpoint. The routing bot maintains the
        mapping between app identifiers and their backend URLs.
      minLength: 1
      pattern: '^[^:]+$'
      examples:
        - jira
        - deploy
        - github
        - grafana

    Slug:
      type: string
      description: |
        An agent/service identifier (Mode B/C).

        In Mode B, agents self-select by slug — each agent is configured with
        a slug and only processes messages matching that slug.

        In Mode C, the slug maps to a registered bot identity via `WGROK_ROUTES`.

        Rules:
        - Must be non-empty
        - Must not contain colons (colon is the field delimiter)
        - Case-sensitive
      minLength: 1
      pattern: '^[^:]+$'
      examples:
        - deploy-agent
        - deploy
        - jira-agent
        - github-orchestrator

    AllowlistPattern:
      type: string
      description: |
        A pattern used to authorize message senders.

        | Format | Example | Matches |
        |--------|---------|---------|
        | Domain | `example.com` | Any `*@example.com` |
        | Wildcard | `*@example.com` | Same as domain (explicit) |
        | Exact | `user@example.com` | Only that email |
        | TLD | `*.com` | Any `*@*.com` |
        | Subdomain wildcard | `*@*.domain.com` | Any user at any subdomain |

        Matching is case-insensitive. Whitespace is trimmed. Empty patterns ignored.
      examples:
        - example.com
        - '*@example.com'
        - admin@example.com
        - '*.internal'
        - '*@*.domain.com'

    RouteEntry:
      type: string
      description: |
        A single route mapping in the agent registry (Mode C).
        Format: `{slug}:{target}` where target is the bot identity (email).

        Example: `deploy:deploy-bot@spark.com`
      pattern: '^[^:]+:[^,]+$'
      examples:
        - deploy:deploy-bot@spark.com
        - status:status-bot@foo.com
        - jira:jira-agent@webex.bot

    SenderConfig:
      type: object
      description: Configuration for the wgrok sender component.
      required:
        - WGROK_TOKEN
        - WGROK_TARGET
        - WGROK_SLUG
      properties:
        WGROK_TOKEN:
          type: string
          description: Messaging platform API token (single token).
        WGROK_PLATFORM:
          type: string
          description: |
            Which messaging platform this token belongs to. Determines which
            transport binding (REST API + WebSocket) to use.
          default: webex
          enum:
            - webex
            - slack
            - discord
        WGROK_TARGET:
          type: string
          format: email
          description: Email/identity of the bot to send commands to.
        WGROK_SLUG:
          type: string
          description: |
            Slug to tag outgoing messages with.
            In Mode A, this maps to the app identifier.
            In Mode B/C, this is the agent identifier.
        WGROK_DOMAINS:
          type: string
          description: Comma-separated allowlist patterns. Optional for sender.
        WGROK_DEBUG:
          type: string
          description: |
            Enable NDJSON debug logging. Truthy: `true`, `1`, `yes`.
          default: 'false'
        WGROK_PROXY:
          type: string
          format: uri
          description: |
            Outbound HTTP/WebSocket proxy URL. All platform API calls and
            WebSocket connections are routed through this proxy when set.
          examples:
            - http://proxy.corp.com:8080

    BotConfig:
      type: object
      description: |
        Configuration for the wgrok routing/relay bot.
        Mode A: routing bot with app registry (proxies to REST APIs).
        Mode B: relay bot processing verbs (echo back to sender).
        Mode C: routing bot with agent registry (routes to registered bots).

        Supports multiple platforms simultaneously and multiple tokens per
        platform for load balancing.
      required:
        - WGROK_DOMAINS
      properties:
        WGROK_TOKEN:
          type: string
          description: |
            Single platform token (backward compat). If set without
            platform-specific tokens, defaults to Webex.
        WGROK_WEBEX_TOKENS:
          type: string
          description: |
            Comma-separated Webex bot tokens. Multiple tokens for load
            balancing outbound sends. Each token opens a WebSocket listener.
          examples:
            - token1,token2,token3
        WGROK_SLACK_TOKENS:
          type: string
          description: |
            Comma-separated Slack bot tokens (`xoxb-...`). Each token opens
            a Socket Mode WebSocket connection.
          examples:
            - xoxb-token1,xoxb-token2
        WGROK_DISCORD_TOKENS:
          type: string
          description: |
            Comma-separated Discord bot tokens. Each token opens a Gateway
            WebSocket connection.
          examples:
            - bot-token1
        WGROK_IRC_TOKENS:
          type: string
          description: |
            Comma-separated IRC connection strings. Format:
            `nick:password@server:port/channel`. Each entry opens a
            persistent TCP/TLS connection to the IRC server.
          examples:
            - wgrok-bot:pass@irc.libera.chat:6697/#wgrok
        WGROK_DOMAINS:
          type: string
          description: Comma-separated allowlist patterns. Required.
        WGROK_ROUTES:
          type: string
          description: |
            Comma-separated agent registry for Mode C. Format: `slug:target,slug:target`.
            Each entry maps a slug to a bot identity (email).

            Same format whether loaded from `.env`, a database column, or an API.
            Parse: split on `,`, split each on first `:`.

            If a slug is found in the registry, the bot routes to the registered
            target (Mode C). If not found, the bot echoes back to sender (Mode B).
          examples:
            - deploy:deploy-bot@spark.com,status:status-bot@foo.com,jira:jira-agent@webex.bot
        WGROK_WEBHOOK_PORT:
          type: integer
          description: |
            When set, the routing bot starts an HTTP server on this port
            accepting `POST /wgrok` requests. Enables non-chat integrations
            (CI/CD, monitoring) to post to the bus without a messaging token.
          examples:
            - 8080
        WGROK_WEBHOOK_SECRET:
          type: string
          description: |
            Shared secret for webhook authentication. Clients send it as
            `Authorization: Bearer <secret>`. Required when webhook is enabled.
        WGROK_DEBUG:
          type: string
          default: 'false'
        WGROK_PROXY:
          type: string
          format: uri
          description: Outbound HTTP/WebSocket proxy URL.

    ReceiverConfig:
      type: object
      description: Configuration for the wgrok receiver/agent component.
      required:
        - WGROK_TOKEN
        - WGROK_SLUG
        - WGROK_DOMAINS
      properties:
        WGROK_TOKEN:
          type: string
          description: Platform API token (single token).
        WGROK_PLATFORM:
          type: string
          description: Which messaging platform this token belongs to.
          default: webex
          enum:
            - webex
            - slack
            - discord
        WGROK_SLUG:
          type: string
          description: Slug to match incoming messages against.
        WGROK_DOMAINS:
          type: string
          description: Comma-separated allowlist patterns. Required.
        WGROK_DEBUG:
          type: string
          default: 'false'
        WGROK_PROXY:
          type: string
          format: uri
          description: Outbound HTTP/WebSocket proxy URL.
